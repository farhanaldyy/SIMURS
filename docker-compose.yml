version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://simurs:simurs_pass@db:3306/simurs
      - JWT_SECRET=simurs-jwt-secret-key-change-in-production
      - JWT_REFRESH_SECRET=simurs-refresh-secret-key-change-in-production
      - PORT=3000
      - NODE_ENV=development
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev

  db:
    image: mariadb:10.11
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=simurs
      - MYSQL_USER=simurs
      - MYSQL_PASSWORD=simurs_pass
    volumes:
      - mariadb_data:/var/lib/mysql

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mariadb_data:
